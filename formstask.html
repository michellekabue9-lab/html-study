<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Application Form</h1>
    <form action="">
        <label for=""> First Name:</label>
        <input type="text">
        <label for="">Last Name:</label>
        <input type="text"> <br> <br>
        <label for=""> Date of birth"</label>
        <input type="date">
        <label for=""> Age:</label>
        <input type="number"> <br> <br>
        <label for="">Gender:</label>
        <select name="Gender" id="">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <label for="">Email:</label>
        <input type="email" placeholder="Enter email address"> <br> <br>
        <label for="">Positions Available:</label>
        <input type="radio" name="Positions Available">Junior Developer 
        <input type="radio" name="Positions Available">Mid-level Developer
        <input type="radio" name="Positons Available">Senior Developer <br> <br>
        <label for=""> Programming Languages</label> 
        <input type="checkbox" name=" Programming Languages"> Java
        <input type="checkbox" name="Programming Languages">Java Script 
        <input type="checkbox" name="Programming Languages">Python <br> <br>
        <label for="">Password</label>
        <input type="password">
        <label for="">Confirm Password</label>
        <input type="password"> <br> <br>
        <input type="submit" value="submit">
        <input type="reset" value="reset">



    </form>
</body>
</html>
